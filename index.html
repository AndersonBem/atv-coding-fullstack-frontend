<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <meta
    name="description"
    content="Aplicativo PWA para cadastro, edição, exclusão e pesquisa de clientes."
  />
  <meta name="robots" content="index, follow" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/192.png" />

  <link rel="stylesheet" href="style.css" />
  <title>Registro de Clientes</title>
</head>
<body class="bg-light">
  <main>
    <div class="container py-4">
      <header class="text-center mb-4">
        <h1 class="mb-2">Registro de Clientes</h1>
        <p class="text-muted">Cadastre, edite, exclua e pesquise clientes</p>
      </header>

      <div class="install-wrapper">
        <button
          id="install-btn"
          class="install-btn hidden"
          type="button"
          aria-label="Instalar aplicativo"
        >
          Instalar aplicativo
        </button>
      </div>


    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo cliente</h2>

        <form id="cliente-form">
          <input type="hidden" id="cliente-id" />

          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="text" id="telefone" class="form-control" placeholder="(81) 99999-9999" required />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" required />
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0"></p>
      </div>
    </section>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Pesquisar cliente por ID</h2>

        <div class="d-flex gap-2 flex-wrap">
          <input type="text" id="search-id" class="form-control" placeholder="Digite o ID do cliente" />
          <button id="search-btn" class="btn btn-outline-primary">Pesquisar</button>
          <button id="clear-search-btn" class="btn btn-outline-secondary">Limpar busca</button>
        </div>

        <div id="search-result" class="mt-3"></div>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Clientes cadastrados</h2>
          <button id="reload-btn" class="btn btn-outline-secondary">Atualizar</button>
        </div>

        <div id="clientes-list"></div>
      </div>
    </section>
  </div>
</main>
  <script src="app.js" defer></script>
</body>
</html>
